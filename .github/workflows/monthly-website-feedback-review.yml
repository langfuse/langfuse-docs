name: Monthly Website Feedback Review

# Creates a tracking issue on the first of every month that asks Claude to
# run the recurring review of #notifications-website-feedback and open a PR
# with doc fixes. The actual work is defined in
# .claude/commands/review-website-feedback.md.

on:
  schedule:
    # 09:00 UTC on the 1st of every month
    - cron: "0 9 1 * *"
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  open-review-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create monthly review issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const month = new Date().toLocaleString("en-US", {
              month: "long",
              year: "numeric",
              timeZone: "UTC",
            });

            const body = [
              "@claude please run the monthly **website feedback review**.",
              "",
              "Invoke the project slash command:",
              "",
              "```",
              "/review-website-feedback",
              "```",
              "",
              "If the slash command is not available in your session, follow the",
              "instructions in `.claude/commands/review-website-feedback.md` directly.",
              "",
              "Audit window: **last 6 weeks** (default in the command).",
              "",
              "What you should do:",
              "1. Pull negative feedback from `#notifications-website-feedback`",
              "   (Slack channel `C0995RY6SAF`) for the window.",
              "2. Skip bot spam (30-char random comments, vote bursts on /security/*",
              "   and /library — see the command file for the full heuristic).",
              "3. Act on pages that hit the user's two criteria:",
              "   (a) surprisingly many real downvotes, or",
              "   (b) a substantive comment that lets us edit the page.",
              "4. Open a PR on a fresh `claude/review-website-feedback-<id>` branch",
              "   against `main`, with a PR body structured like #2935.",
              "5. Close this issue once the PR is open, linking the PR.",
              "",
              "Skip and close this issue with a short note if there is nothing",
              "actionable in the window.",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Monthly website feedback review — ${month}`,
              body,
              labels: ["docs", "automation"],
            });

name: Update available-internal-links cursor rule

on:
  schedule:
    - cron: "0 1 * * *" # Runs daily at 1am UTC
  workflow_dispatch: # Allows manual triggering

permissions: {}

jobs:
  update-available-internal-links-cursor-rule:
    runs-on: ubuntu-latest
    environment: "main"
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          token: ${{ secrets.UPDATE_DOCS_MAIN_BRANCH_PAT }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: "9.5.0"

      - name: Install dependencies
        run: pnpm install

      - name: Build sitemap and generate llms.txt
        run: pnpm run build
        # The llms.txt generation happens automatically as part of the postbuild process

      - name: Append llms.txt to available-internal-links cursor rule
        run: |
          # Find the line number where "// Start of LLMs.txt" appears
          LINE_NUM=$(grep -n "// Start of LLMs.txt" .agents/cursor/rules/available-internal-links.mdc | cut -d: -f1)

          if [ -n "$LINE_NUM" ]; then
            # Keep the file content up to that line
            head -n $LINE_NUM .agents/cursor/rules/available-internal-links.mdc > temp_file
            echo "" >> temp_file  # Add a blank line after the marker
            
            # Filter the llms.txt content - replace absolute links with relative ones
            cat public/llms.txt public/llms-docs.txt public/llms-integrations.txt public/llms-self-hosting.txt | sed 's|https://langfuse.com||g' >> temp_file
            
            mv temp_file .agents/cursor/rules/available-internal-links.mdc
            echo "Successfully appended llms.txt content to available-internal-links.mdc with relative links"
          else
            echo "Could not find '// Start of LLMs.txt' marker in available-internal-links.mdc"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .agents/cursor/rules/available-internal-links.mdc
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update available-internal-links.mdc" && git push "https://x-access-token:${UPDATE_DOCS_MAIN_BRANCH_PAT}@github.com/${GITHUB_REPOSITORY}.git" "${GITHUB_REF#refs/heads/}")
        env:
          UPDATE_DOCS_MAIN_BRANCH_PAT: ${{ secrets.UPDATE_DOCS_MAIN_BRANCH_PAT }}
